name: CI — Build, Test & Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 20

jobs:
  # ────────────────────────────────────────────────────────────
  #  BACKEND
  # ────────────────────────────────────────────────────────────
  backend:
    name: Backend — TypeScript + Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          JWT_ACCESS_SECRET: test-access-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          VAPID_PUBLIC_KEY: test-key
          VAPID_PRIVATE_KEY: test-key
          VAPID_SUBJECT: mailto:test@test.com

  # ────────────────────────────────────────────────────────────
  #  HR DASHBOARD
  # ────────────────────────────────────────────────────────────
  hr:
    name: HR Dashboard — Build + Lint + Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: hr

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: hr/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  # ────────────────────────────────────────────────────────────
  #  CANDIDATE PWA
  # ────────────────────────────────────────────────────────────
  candidate:
    name: Candidate PWA — Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: candidate

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: candidate/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build

  # ────────────────────────────────────────────────────────────
  #  MATRIX SUMMARY
  # ────────────────────────────────────────────────────────────
  summary:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [backend, hr, candidate]

    steps:
      - run: |
          echo "All 3 jobs completed successfully:"
          echo "  - Backend (tsc + 86 tests)"
          echo "  - HR dashboard (lint + 15 tests + build)"
          echo "  - Candidate PWA (build)"
          echo ""
          echo "CodeQL security scanning runs via GitHub default setup"
