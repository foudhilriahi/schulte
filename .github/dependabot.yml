version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: daily
      time: "06:00"
      timezone: Africa/Tunis
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend

  - package-ecosystem: npm
    directory: /hr
    schedule:
      interval: daily
      time: "06:00"
      timezone: Africa/Tunis
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - hr

  - package-ecosystem: npm
    directory: /candidate
    schedule:
      interval: daily
      time: "06:00"
      timezone: Africa/Tunis
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - candidate
